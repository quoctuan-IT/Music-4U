<!-- Search Section -->
<div class="container pt-5">
    <div class="card-body">
        <form action="{% url 'search' %}" class="row g-3 align-items-end justify-content-center" method="get">
            <!-- Search Input -->
            <div class="col-lg-4 col-md-5 col-12">
                <label class="form-label fw-semibold" for="searchInput">
                    <i class="bi bi-search-heart"></i> Search
                </label>

                <input class="form-control" id="searchInput" name="query" placeholder="Enter Song title or Artist"
                       type="text" value="{{ query }}">
            </div>

            <!-- Genre Filter -->
            <div class="col-lg-3 col-md-4 col-12">
                <label class="form-label fw-semibold" for="genreSelect">
                    <i class="bi bi-funnel"></i> Filter by Genre
                </label>

                <select class="form-select" id="genreSelect" name="genre">
                    <option value="">All Genres</option>

                    {% for genre in genres %}
                    <option value="{{ genre.id }}"
                            {% if genre.id|stringformat:"s" == selected_genre %}selected{% endif %}>
                        {{ genre.name }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <!-- Search Button -->
            <div class="col-lg-2 col-md-3 col-6 d-grid">
                <button class="btn text-black" style="background-color: pink;" type="submit">
                    Search <i class="bi bi-search-heart"></i>
                </button>
            </div>
        </form>

        <!-- Clear Button (when has filters) -->
        {% if query or selected_genre %}
        <div class="text-center mt-3">
            <a class="btn btn-outline-danger" href="{% url 'index' %}">
                Clear Filters
            </a>
        </div>
        {% endif %}

    </div>

    <hr class="my-4 border-secondary">
</div>


<style>
    @media (max-width: 576px) {
        .form-control,
        .form-select {
            font-size: 16px;
        }
    }
</style>
